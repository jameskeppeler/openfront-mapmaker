# Render deployment configuration
# Set this service's Root Directory to "webapp" in the Render dashboard so the
# build runs where pyproject.toml / uv.lock live.
services:
  - type: web
    name: openfront-map-generator
    runtime: python
    # uv installs the right Python (from .python-version) and the exact locked deps.
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: OPENTOPO_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        sync: false
